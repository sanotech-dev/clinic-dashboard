<!-- indext.html -->

<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>داشبورد مدیریت کلینیک</title>
    <link href="https://cdn.jsdelivr.net/gh/rastikerdar/vazirmatn@v33.003/Vazirmatn-font-face.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- هدر -->
        <header class="dashboard-header">
            <h1>🏥 کلینیک سلامت</h1>
            <p>سیستم مدیریت بیماران</p>
        </header>

        <!-- آمار -->
        <div class="stats-grid">
            <div class="stat-card">
                <h3 id="totalPatients">0</h3>
                <p>کل بیماران</p>
            </div>
            <div class="stat-card">
                <h3 id="newPatients">0</h3>
                <p>بیماران جدید امروز</p>
            </div>
        </div>

        <!-- فرم ثبت -->
<section class="form-section glass">
    <h2 id="formTitle">📝 ثبت بیمار جدید</h2>
    <form id="patientForm">
        <div class="form-group">
            <label for="name">نام و نام خانوادگی:</label>
            <input type="text" id="name" placeholder="مثال: علی احمدی">
            <span class="error-message" id="nameError"></span>
        </div>
        <div class="form-group">
            <label for="age">سن:</label>
            <input type="number" id="age" placeholder="مثال: ۳۵" inputmode="numeric" pattern="[0-9]*">
            <span class="error-message" id="ageError"></span>
        </div>
        <div class="form-group">
            <label for="phone">شماره تماس:</label>
            <input type="tel" id="phone" placeholder="مثال: ۰۹۱۲۳۴۵۶۷۸۹" inputmode="tel" pattern="[0-9]*">
            <span class="error-message" id="phoneError"></span>
        </div>
        <div class="form-actions">
            <button type="submit" id="submitBtn" class="btn-primary">➕ ثبت بیمار</button>
            <button type="button" id="cancelBtn" class="btn-secondary hidden">❌ لغو ویرایش</button>
        </div>
    </form>
</section>

        <!-- جستجو -->
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="جستجو بر اساس نام بیمار...">
        </div>

        <!-- لیست بیماران -->
        <section class="list-section">
            <h2>📋 لیست بیماران</h2>
            <div id="patientsList" class="patients-grid">
                <p class="empty-state">هنوز بیماری ثبت نشده...</p>
            </div>
        </section>
    </div>
    <script type="module" src="dist/app.js"></script>
</body>
</html>
