<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>داشبورد مدیریت کلینیک</title>
    <link href="https://cdn.jsdelivr.net/gh/rastikerdar/vazirmatn@v33.003/Vazirmatn-font-face.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- هدر -->
        <header class="dashboard-header">
            <h1>🏥 کلینیک سلامت</h1>
            <p>سیستم مدیریت بیماران</p>
        </header>

        <!-- آمار -->
        <div class="stats-grid">
            <div class="stat-card">
                <h3 id="totalPatients">0</h3>
                <p>کل بیماران</p>
            </div>
            <div class="stat-card">
                <h3 id="newPatients">0</h3>
                <p>بیماران جدید امروز</p>
            </div>
        </div>

        <!-- فرم ثبت -->
        <section class="form-section glass">
            <h2>📝 ثبت بیمار جدید</h2>
            <form id="patientForm">
                <div class="form-group">
                    <label for="name">نام و نام خانوادگی:</label>
                    <input type="text" id="name" required placeholder="مثال: علی احمدی">
                </div>
                <div class="form-group">
                    <label for="age">سن:</label>
                    <input type="number" id="age" required placeholder="مثال: 35">
                </div>
                <div class="form-group">
                    <label for="phone">شماره تماس:</label>
                    <input type="tel" id="phone" required placeholder="مثال: 09123456789">
                </div>
                <button type="submit" class="btn-primary">➕ ثبت بیمار</button>
            </form>
        </section>

        <!-- جستجو -->
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="جستجو بر اساس نام بیمار...">
        </div>

        <!-- لیست بیماران -->
        <section class="list-section">
            <h2>📋 لیست بیماران</h2>
            <div id="patientsList" class="patients-grid">
                <p class="empty-state">هنوز بیماری ثبت نشده...</p>
            </div>
        </section>
    </div>
    <script type="module" src="app.js"></script>
</body>
</html>
